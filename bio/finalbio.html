 <script>
 // Particle Animation System
 const canvas = document.getElementById('particleCanvas');
 const ctx = canvas.getContext('2d');
 
 // Set canvas size
 function resizeCanvas() {
 canvas.width = window.innerWidth;
 canvas.height = window.innerHeight;
 }
 
 resizeCanvas();
 window.addEventListener('resize', resizeCanvas);

 // Particle system with red/black theme - clean and minimal
 const particles = [];
 const particleCount = 12; // Clean, minimal particle count

 class Particle {
 constructor() {
 this.x = Math.random() * canvas.width;
 this.y = Math.random() * canvas.height;
 this.vx = (Math.random() - 0.5) * 0.3; // Even slower for cleaner effect
 this.vy = (Math.random() - 0.5) * 0.3;
 this.size = Math.random() * 1.5 + 0.5; // Very small particles
 this.color = this.getRandomColor();
 this.alpha = Math.random() * 0.3 + 0.2; // More subtle opacity
 this.pulseSpeed = Math.random() * 0.015 + 0.005;
 this.pulse = 0;
 }

 getRandomColor() {
 const colors = ['#dc2626', '#991b1b', '#450a0a']; // Cleaner, darker red palette
 return colors[Math.floor(Math.random() * colors.length)];
 }

 update() {
 this.x += this.vx;
 this.y += this.vy;
 this.pulse += this.pulseSpeed;

 // Bounce off edges
 if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
 if (this.y < 0 || this.y > canvas.height) this.vy *= -1;

 // Keep particles in bounds
 this.x = Math.max(0, Math.min(canvas.width, this.x));
 this.y = Math.max(0, Math.min(canvas.height, this.y));
 }

 draw() {
 const glowSize = this.size + Math.sin(this.pulse) * 2;
 const glowAlpha = this.alpha + Math.sin(this.pulse) * 0.3;

 // Outer glow
 ctx.beginPath();
 ctx.arc(this.x, this.y, glowSize * 4, 0, Math.PI * 2);
 ctx.fillStyle = `${this.color}15`;
 ctx.fill();

 // Middle glow
 ctx.beginPath();
 ctx.arc(this.x, this.y, glowSize * 2.5, 0, Math.PI * 2);
 ctx.fillStyle = `${this.color}30`;
 ctx.fill();

 // Inner glow
 ctx.beginPath();
 ctx.arc(this.x, this.y, glowSize * 1.5, 0, Math.PI * 2);
 ctx.fillStyle = `${this.color}50`;
 ctx.fill();

 // Core particle
 ctx.beginPath();
 ctx.arc(this.x, this.y, glowSize, 0, Math.PI * 2);
 ctx.fillStyle = this.color + Math.floor(glowAlpha * 255).toString(16).padStart(2, '0');
 ctx.fill();
 }
 }

 // Initialize particles
 for (let i = 0; i < particleCount; i++) {
 particles.push(new Particle());
 }

 // Animation loop
 function animate() {
 ctx.clearRect(0, 0, canvas.width, canvas.height);
 
 particles.forEach(particle => {
 particle.update();
 particle.draw();
 });

 requestAnimationFrame(animate);
 }

 animate();
 </script>
</body>
